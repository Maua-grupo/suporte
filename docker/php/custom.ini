date.timezone = America/Sao_Paulo
memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 120
max_input_vars = 3000
; Erros NAO sao impressos na saida (evita corromper respostas JSON/AJAX,
; que era a causa das falhas silenciosas ao abrir chamado).
display_errors = Off
display_startup_errors = Off
; Em vez disso, tudo e registrado no log -> aparece em `docker logs ocomon_web`.
log_errors = On
error_log = /dev/stderr
; Nao trunca mensagens longas (stack traces de fatais) no log.
log_errors_max_len = 0
error_reporting = E_ALL
